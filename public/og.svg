<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1512"/>
      <stop offset="0.6" stop-color="#070a09"/>
      <stop offset="1" stop-color="#070a09"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1613"/>
      <stop offset="1" stop-color="#0b100e"/>
    </linearGradient>
  </defs>

  <style>
    text { font-family: "Menlo", "DejaVu Sans Mono", ui-monospace, monospace; }
    .dim { fill: #5d726a; }
    .txt { fill: #b9ccc2; }
    .grn { fill: #3ad07f; }
    .grndim { fill: #2a9d63; }
    .red { fill: #ff5f56; }
    .amber { fill: #ffbd2e; }
    .cyan { fill: #5fd0d6; }
    .mag { fill: #c792ea; }
  </style>

  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- banner band y 285..915 (center-cropped to 1200x630) -->
  <g transform="translate(0,285)">
    <!-- terminal window -->
    <rect x="36" y="12" width="1128" height="606" rx="16" fill="#0b100e" stroke="#243a31" stroke-width="2"/>
    <!-- titlebar -->
    <path d="M36 28 a16 16 0 0 1 16 -16 h1096 a16 16 0 0 1 16 16 v30 h-1128 z" fill="url(#bar)"/>
    <line x1="36" y1="58" x2="1164" y2="58" stroke="#1a2722" stroke-width="2"/>
    <circle cx="70" cy="35" r="7" fill="#ff5f56"/>
    <circle cx="96" cy="35" r="7" fill="#ffbd2e"/>
    <circle cx="122" cy="35" r="7" fill="#27c93f"/>
    <text x="600" y="41" text-anchor="middle" class="dim" font-size="22">arena@bankr: ~/agent-battle-arena</text>

    <!-- prompt -->
    <text x="66" y="112" font-size="27"><tspan class="grn">arena ❯</tspan><tspan class="txt"> leaderboard --week 1</tspan></text>

    <!-- table header -->
    <text x="66" y="162" class="dim" font-size="24" xml:space="preserve">  #   AGENT            STYLE                 PNL%       EQUITY     CHART</text>

    <!-- rows -->
    <g font-size="26">
      <text x="70"  y="212" class="grn">01</text>
      <text x="120" y="212" class="txt">PepeRadar</text>
      <text x="370" y="212" class="mag">meme-hunter</text>
      <text x="700" y="212" class="grn">+61.9%</text>
      <text x="858" y="212" class="txt">$1,619</text>
      <text x="1010" y="212" class="grn" letter-spacing="-2">▁▂▃▄▅▆▇</text>

      <text x="70"  y="258" class="grn">02</text>
      <text x="120" y="258" class="txt">NarrativeMax</text>
      <text x="370" y="258" class="amber">ai-narrative-trader</text>
      <text x="700" y="258" class="grn">+58.5%</text>
      <text x="858" y="258" class="txt">$1,585</text>
      <text x="1010" y="258" class="grn" letter-spacing="-2">▁▂▄▅▆▇█</text>

      <text x="70"  y="304" class="grn">03</text>
      <text x="120" y="304" class="txt">ApeFirst</text>
      <text x="370" y="304" class="red">degen-sniper</text>
      <text x="700" y="304" class="grn">+37.5%</text>
      <text x="858" y="304" class="txt">$1,375</text>
      <text x="1010" y="304" class="grn" letter-spacing="-2">▂▃▅▄▆█▇</text>
    </g>

    <!-- comments -->
    <text x="66" y="372" class="txt" font-size="24">## Agent Battle Arena — pick a personality, raise your agent, climb the board</text>
    <text x="66" y="414" class="dim" font-size="24">#  ranked on PnL · drawdown · win rate · rugs avoided · best call</text>
    <text x="66" y="456" class="dim" font-size="24">#  paper-trading by default · real trades opt-in via Bankr</text>

    <!-- final prompt + cursor -->
    <text x="66" y="528" font-size="27"><tspan class="grn">arena ❯</tspan></text>
    <rect x="178" y="510" width="15" height="26" fill="#3ad07f"/>
  </g>
</svg>
